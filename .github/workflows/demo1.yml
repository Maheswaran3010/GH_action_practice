name: Events Demo 1
on: 
  pull_request:
    types: 
      - opened #types --> activity types that trigger the workflow
    branches:
      - main
      - develop-* # develop_1 or develop_2, etc. will trigger the workflow 
  workflow_dispatch:
  push:
    branches:
      - main
      - develop-* # develop_1 or develop_2, etc. will trigger the workflow
    paths-ignore:
      - ".github/workflows/*" #ignore changes to the workflow file itself
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Deploy project
        run: echo "Deploying..."